version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd WebSite/callblick-web
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: WebSite/callblick-web/.next
    files:
      - '**/*'
  cache:
    paths:
      - WebSite/callblick-web/node_modules/**/*
      - WebSite/callblick-web/.next/cache/**/*
