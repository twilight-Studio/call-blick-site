version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd callblick-web
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: callblick-web/.next
    files:
      - '**/*'
  cache:
    paths:
      - callblick-web/node_modules/**/*
      - callblick-web/.next/cache/**/*
